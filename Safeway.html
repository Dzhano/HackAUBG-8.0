<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safeway - Sofia Navigation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const SafewayApp = () => {
            const [addr1, setAddr1] = useState('');
            const [addr2, setAddr2] = useState('');
            const [suggestions, setSuggestions] = useState([]);
            const [selectedCard, setSelectedCard] = useState('balanced');

            // LIVE AUTOFILL LOGIC (Photon API)
            const getAutofill = async (query) => {
                if (query.length < 3) return; // Only search if more than 2 chars

                try {
                    // lat=42.69 & lon=23.32 tells the API to prioritize results near Sofia
                    const response = await fetch(
                        `https://photon.komoot.io/api/?q=${encodeURIComponent(query)}&lat=42.6977&lon=23.3219&limit=5`
                    );
                    const data = await response.json();
                    
                    const formatted = data.features.map(f => {
                        const p = f.properties;
                        // Build a clean address string
                        const parts = [p.name, p.street, p.housenumber, p.city, "Bulgaria"]
                            .filter(Boolean); // Remove empty parts
                        return parts.join(", ");
                    });

                    // Remove duplicates and update suggestions
                    setSuggestions([...new Set(formatted)]);
                } catch (err) {
                    console.error("Autofill error:", err);
                }
            };

            const handleGo = () => {
                alert(`Calculating routes from: \n${addr1} \nto: \n${addr2}`);
                // This is where you would paste your API call for the 3 routes
            };

            return (
                <div className="flex flex-col min-h-screen font-sans text-gray-900">
                    
                    {/* --- HEADER --- */}
                    <header className="flex items-center justify-between p-4 bg-white border-b shadow-md sticky top-0 z-10">
                        {/* Logo Placeholder */}
                        <div className="flex items-center justify-center w-12 h-12 bg-blue-600 rounded-lg text-white font-black italic shadow-inner">
                            SW
                        </div>

                        {/* Address Inputs */}
                        <div className="flex flex-1 max-w-3xl mx-8 gap-3">
                            <div className="flex-1 relative">
                                <input
                                    list="photon-data"
                                    type="text"
                                    placeholder="Starting point (Sofia)..."
                                    className="w-full px-4 py-2 bg-gray-100 border border-transparent rounded-full focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                                    value={addr1}
                                    onChange={(e) => { setAddr1(e.target.value); getAutofill(e.target.value); }}
                                />
                            </div>
                            
                            <div className="flex-1 relative">
                                <input
                                    list="photon-data"
                                    type="text"
                                    placeholder="Destination..."
                                    className="w-full px-4 py-2 bg-gray-100 border border-transparent rounded-full focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                                    value={addr2}
                                    onChange={(e) => { setAddr2(e.target.value); getAutofill(e.target.value); }}
                                />
                            </div>

                            <button 
                                onClick={handleGo}
                                className="px-8 py-2 bg-blue-600 text-white font-bold rounded-full hover:bg-blue-700 shadow-lg active:scale-95 transition-all"
                            >
                                GO
                            </button>
                        </div>

                        {/* The dynamic suggestion list */}
                        <datalist id="photon-data">
                            {suggestions.map((item, index) => (
                                <option key={index} value={item} />
                            ))}
                        </datalist>
                    </header>

                    {/* --- MAIN (MAP AREA) --- */}
                    <main className="flex-grow bg-gray-200 flex items-center justify-center relative overflow-hidden">
                        <div className="absolute inset-0 opacity-20 bg-[radial-gradient(#3b82f6_1px,transparent_1px)] [background-size:20px_20px]"></div>
                        <div className="z-0 text-center">
                            <p className="text-gray-500 font-medium">Map logic goes here</p>
                            <p className="text-xs text-gray-400 mt-2 italic">Rendering 3 routes based on selection...</p>
                        </div>
                    </main>

                    {/* --- FOOTER (3 CARDS) --- */}
                    <footer className="p-6 bg-white border-t border-gray-200">
                        <div className="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6">
                            
                            {/* Fastest */}
                            <div 
                                onClick={() => setSelectedCard('fastest')}
                                className={`p-5 rounded-2xl border-2 transition-all cursor-pointer transform hover:-translate-y-1 ${
                                    selectedCard === 'fastest' ? 'border-orange-500 bg-orange-50 ring-2 ring-orange-200 shadow-xl' : 'border-gray-100 bg-white shadow-sm'
                                }`}
                            >
                                <div className="flex items-center gap-3">
                                    <div className="p-2 bg-orange-100 rounded-lg text-orange-600">⚡</div>
                                    <h3 className="font-bold text-lg uppercase">Fastest</h3>
                                </div>
                                <p className="text-sm text-gray-500 mt-2 italic">Optimized for time.</p>
                            </div>

                            {/* Balanced */}
                            <div 
                                onClick={() => setSelectedCard('balanced')}
                                className={`p-5 rounded-2xl border-2 transition-all cursor-pointer transform hover:-translate-y-1 ${
                                    selectedCard === 'balanced' ? 'border-blue-500 bg-blue-50 ring-2 ring-blue-200 shadow-xl' : 'border-gray-100 bg-white shadow-sm'
                                }`}
                            >
                                <div className="flex items-center gap-3">
                                    <div className="p-2 bg-blue-100 rounded-lg text-blue-600">⚖️</div>
                                    <h3 className="font-bold text-lg uppercase">Balanced</h3>
                                </div>
                                <p className="text-sm text-gray-500 mt-2 italic">Standard transit speed.</p>
                            </div>

                            {/* Safest */}
                            <div 
                                onClick={() => setSelectedCard('safest')}
                                className={`p-5 rounded-2xl border-2 transition-all cursor-pointer transform hover:-translate-y-1 ${
                                    selectedCard === 'safest' ? 'border-green-500 bg-green-50 ring-2 ring-green-200 shadow-xl' : 'border-gray-100 bg-white shadow-sm'
                                }`}
                            >
                                <div className="flex items-center gap-3">
                                    <div className="p-2 bg-green-100 rounded-lg text-green-600">🛡️</div>
                                    <h3 className="font-bold text-lg uppercase">Safest</h3>
                                </div>
                                <p className="text-sm text-gray-500 mt-2 italic">Main roads & well-lit paths.</p>
                            </div>

                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SafewayApp />);
    </script>
</body>
</html>
